<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sistem Control Sincretic</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9;}
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 0px 10px gray; display: inline-block; margin: 10px; width: 300px; vertical-align: top;}
        .alerta { color: red; font-weight: bold; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; cursor: pointer; border: none; border-radius: 5px;}
        .btn-on { background-color: #4CAF50; color: white; }
        .btn-off { background-color: #f44336; color: white; }
        .btn-msg { background-color: #2196F3; color: white; width: 100%; margin-top: 10px;}
        input[type="text"] { padding: 10px; width: 90%; border-radius: 5px; border: 1px solid #ccc;}
    </style>
</head>
<body>

    <h1>Interfață Control Sistem</h1>

    <div class="card">
        <h2>Senzori</h2>
        <p>Temperatura: <span id="tempValue" style="font-weight: bold; font-size: 1.2em;">--</span> °C</p>
        <p>Stare Inundație: <span id="floodValue">Verificare...</span></p>
    </div>

    <div class="card">
        <h2>Control LED</h2>
        <button class="btn-on" onclick="schimbaLed('on')">Aprinde LED</button>
        <button class="btn-off" onclick="schimbaLed('off')">Stinge LED</button>
    </div>

    <div class="card">
        <h2>Trimite Mesaj EEPROM</h2>
        <input type="text" id="inputMesaj" placeholder="Scrie mesajul aici..." maxlength="28">
        <button class="btn-msg" onclick="trimiteMesajul()">Trimite către Sistem</button>
    </div>

    <script>
        function actualizeazaDate() {
            fetch('/api/date')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('tempValue').innerText = data.temperatura;
                    let floodSpan = document.getElementById('floodValue');
                    if(data.inundatie === "1") {
                        floodSpan.innerText = "ALARMĂ INUNDAȚIE!";
                        floodSpan.className = "alerta";
                    } else {
                        floodSpan.innerText = "Normal (Uscat)";
                        floodSpan.className = "";
                    }
                })
                .catch(error => console.error('Eroare:', error));
        }

        function schimbaLed(actiune) {
            fetch('/led/' + actiune);
        }

        // Funcția nouă care trimite textul scris către Python
        function trimiteMesajul() {
            let casutaText = document.getElementById('inputMesaj');
            let textTrimis = casutaText.value;

            if (textTrimis.trim() === "") {
                alert("Te rog scrie un mesaj!");
                return;
            }

            fetch('/api/mesaj', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: textTrimis })
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "succes") {
                    alert("Mesajul a fost trimis cu succes către Arduino!");
                    casutaText.value = ""; // Golește căsuța după trimitere
                }
            });
        }

        setInterval(actualizeazaDate, 1000);
        actualizeazaDate();
    </script>
</body>
</html>
